<!DOCTYPE html>
<html>
<head>
    <title>My Weekly Schedule</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>My Weekly Schedule</h1>

    <table>
        <tr>
            <th>Day</th>
            <th>Activities</th>
        </tr>

        <tr>
            <td>Monday</td>
            <td>DSA Practice, College Classes</td>
        </tr>

        <tr>
            <td>Tuesday</td>
            <td>Django Learning, Assignments</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td>Competitive Programming, Revision</td>
        </tr>

        <tr>
            <td>Thursday</td>
            <td>Project Work, Study</td>
        </tr>

        <tr>
            <td>Friday</td>
            <td>Mock Tests, Practice</td>
        </tr>

        <tr>
            <td>Saturday</td>
            <td>Side Course, Coding Practice</td>
        </tr>

        <tr>
            <td>Sunday</td>
            <td>Rest, Planning Next Week</td>
        </tr>

    </table>

</body>
</html>
