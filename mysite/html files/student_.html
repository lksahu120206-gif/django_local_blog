<!DOCTYPE html>
<html>
<head>
    <title>Student Report</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Student Report</caption>

        <tr>
            <th>Student Name</th>
            <th>Roll No</th>
            <th>Math</th>
            <th>Science</th>
            <th>English</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>Lalit</td>
            <td>101</td>
            <td>85</td>
            <td>90</td>
            <td>88</td>
            <td>A</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>102</td>
            <td>75</td>
            <td>80</td>
            <td>70</td>
            <td>B</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>103</td>
            <td>92</td>
            <td>95</td>
            <td>94</td>
            <td>A+</td>
        </tr>

    </table>

</body>
</html>
